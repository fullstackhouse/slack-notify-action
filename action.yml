name: Slack Notify
description: Send a richly-formatted Slack notification from a GitHub Actions workflow
author: Full Stack House

branding:
  icon: message-square
  color: purple

inputs:
  bot-token:
    description: Slack bot token (xoxb-…). Mutually exclusive with webhook-url.
    required: false
  webhook-url:
    description: Slack incoming webhook URL. Mutually exclusive with bot-token.
    required: false
  channel:
    description: Slack channel (e.g. "#fsh-alerts"). Required when using bot-token; ignored for webhook-url.
    required: false
  title:
    description: Notification title (shown as a header block).
    required: true
  message:
    description: Notification body (mrkdwn).
    required: true
  status:
    description: One of "success", "failure", "info" (default). Controls header emoji.
    required: false
    default: info
  fields:
    description: Optional JSON array of extra Slack field objects (e.g. `[{"type":"mrkdwn","text":"*Region:*\nEU"}]`). Rendered after the default Repository/Branch fields.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        BOT_TOKEN: ${{ inputs.bot-token }}
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        CHANNEL: ${{ inputs.channel }}
      run: |
        if [[ -z "$BOT_TOKEN" && -z "$WEBHOOK_URL" ]]; then
          echo "::error::Either bot-token or webhook-url must be provided"
          exit 1
        fi
        if [[ -n "$BOT_TOKEN" && -n "$WEBHOOK_URL" ]]; then
          echo "::error::bot-token and webhook-url are mutually exclusive"
          exit 1
        fi
        if [[ -n "$BOT_TOKEN" && -z "$CHANNEL" ]]; then
          echo "::error::channel is required when using bot-token"
          exit 1
        fi

    - name: Build payload
      id: payload
      shell: bash
      env:
        TITLE: ${{ inputs.title }}
        MESSAGE: ${{ inputs.message }}
        STATUS: ${{ inputs.status }}
        EXTRA_FIELDS: ${{ inputs.fields }}
        CHANNEL: ${{ inputs.channel }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        case "$STATUS" in
          success) emoji="✅" ;;
          failure) emoji="❌" ;;
          *)       emoji="ℹ️" ;;
        esac
        header="${emoji} ${TITLE}"

        payload_file="${RUNNER_TEMP}/slack-notify-payload.json"

        jq -n \
          --arg channel "$CHANNEL" \
          --arg header "$header" \
          --arg message "$MESSAGE" \
          --arg repo "$REPO" \
          --arg branch "$BRANCH" \
          --arg run_url "$RUN_URL" \
          --argjson extra_fields "${EXTRA_FIELDS:-[]}" \
          '
          def default_fields: [
            {type: "mrkdwn", text: ("*Repository:*\n" + $repo)},
            {type: "mrkdwn", text: ("*Branch:*\n" + $branch)}
          ];

          def blocks:
            [
              {type: "header", text: {type: "plain_text", text: $header}},
              {type: "section", text: {type: "mrkdwn", text: $message}},
              {type: "section", fields: default_fields}
            ]
            + (if ($extra_fields | length) > 0 then [{type: "section", fields: $extra_fields}] else [] end)
            + [{
                type: "actions",
                elements: [{
                  type: "button",
                  text: {type: "plain_text", text: "View Run"},
                  url: $run_url
                }]
              }];

          if $channel != "" then
            {channel: $channel, text: $header, blocks: blocks}
          else
            {text: $header, blocks: blocks}
          end
          ' > "$payload_file"

        echo "file=$payload_file" >> "$GITHUB_OUTPUT"

    - name: Send via bot token
      if: inputs.bot-token != ''
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ inputs.bot-token }}
        payload-file-path: ${{ steps.payload.outputs.file }}

    - name: Send via webhook
      if: inputs.webhook-url != ''
      uses: slackapi/slack-github-action@v2.0.0
      with:
        webhook: ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload-file-path: ${{ steps.payload.outputs.file }}
